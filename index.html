<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <!-- ICONO DE LA PESTAÑA -->
    <link rel="icon" type="image/x-icon" href="Img/Mei_icon.png">

    <title>Loop - WebSite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="screen">

    <!-- BOTÓN DE MÚSICA -->
    <button id="musicToggle" class="music-button">
        <img id="musicIcon" src="Sounds, Speech, and Audio Devices.ico" alt="Music">
    </button>

    <!-- AUDIO -->
    <audio id="bgMusic" loop>
        <source src="Mus/room_peaceful.ogg" type="audio/ogg">
    </audio>


    <div class="sidebar-icons">
        <div class="icon">
            <img src="https://win98icons.alexmeub.com/icons/png/computer_explorer-4.png">
            <span>Bienvenido</span>
        </div>

        <div class="icon">
            <img src="https://win98icons.alexmeub.com/icons/png/envelope_closed-0.png">
            <span>Soup Tire</span>
        </div>

        <div class="icon">
            <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png">
            <span>Newsletters</span>
        </div>
    </div>


    <div class="window-container">
        <div class="window">

            <div class="title-bar">
                <div class="title-bar-text">
                    <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-0.png" width="16" style="margin-right:5px;">
                    ¡Bienvenido!
                </div>
                <div class="title-bar-controls">
                    <button></button>
                    <button></button>
                    <button></button>
                </div>
            </div>

            <div class="window-menu">
                <span>Archivo</span>
                <span>Editar</span>
                <span>Ver</span>
                <span>Favoritos</span>
                <span>Ayuda</span>
            </div>

            <div class="window-body">

                <div class="post-header">
                    <span>Marzo 1, 2026</span>
                    <span>1 Nota</span>
                </div>

                <div class="image-frame">
                    <img src="Img/cat.png" alt="Post">
                </div>

                <div class="caption-container">
                    <p>
                        ¡Bienvenidos a mi página de noticias! Aquí encontrarás las últimas novedades sobre mis proyectos, eventos y más.
                    </p>
                </div>

                <div class="tags">
                    <a href="#">#Bienvenido</a>
                </div>

            </div>
        </div>
    </div>


    <!-- DECORACIONES -->
    <div class="decorations">

        <!-- AHORA MEI SI REDIRIGE -->
        <a href="Recursos/mei.html">
            <img src="Img/Mei.png" class="mei-button">
        </a>

        <img src="Img/Mei_Ramire.png" class="character-large">
    </div>


    <div class="taskbar">
        <div class="start-button">
            <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="18">
            <span>Inicio</span>
        </div>

        <div class="taskbar-divider"></div>

        <div class="task-active">
            <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-0.png" width="16">
            <span>Mis Documentos</span>
        </div>

        <div class="system-tray">
            <img src="https://win98icons.alexmeub.com/icons/png/loudspeaker_rays-0.png" width="16">
            <span id="clock">00:00 AM</span>
        </div>
    </div>

</div>


<script>

/* RELOJ */
function updateClock() {
    const now = new Date();
    let hours = now.getHours();
    const minutes = now.getMinutes().toString().padStart(2, '0');

    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12;

    document.getElementById('clock').textContent =
        hours + ':' + minutes + ' ' + ampm;
}

updateClock();
setInterval(updateClock, 1000);


/* MÚSICA */
const musicButton = document.getElementById("musicToggle");
const bgMusic = document.getElementById("bgMusic");

let isPlaying = false;

musicButton.addEventListener("click", () => {
    if (!isPlaying) {
        bgMusic.play();
        isPlaying = true;
    } else {
        bgMusic.pause();
        isPlaying = false;
    }
});

</script>

</body>
</html>
