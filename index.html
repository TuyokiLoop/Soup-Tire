<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Loop - WebSite</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>



    <div id="screen">

        <div class="sidebar-icons">

            <div class="icon">

                <img src="https://win98icons.alexmeub.com/icons/png/computer_explorer-4.png" alt="Welcome">

                <span>Bienvenido</span>

            </div>

            <div class="icon">

                <img src="https://win98icons.alexmeub.com/icons/png/envelope_closed-0.png" alt="Host">

                <span>Soup Tire</span>

            </div>

            <div class="icon">

                <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png" alt="Archive">

                <span>Newsletters</span>

            </div>

        </div>



        <div class="window-container">

            <div class="window">

                <div class="title-bar">

                    <div class="title-bar-text">

                        <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-0.png" width="16" style="margin-right: 5px;">

                        Mis Documentos

                    </div>

                    <div class="title-bar-controls">

                        <button aria-label="Minimize"></button>

                        <button aria-label="Maximize"></button>

                        <button aria-label="Close"></button>

                    </div>

                </div>

                

                <div class="window-menu">

                    <span>Archivo</span>

                    <span>Editar</span>

                    <span>Ver</span>

                    <span>Favoritos</span>

                    <span>Ayuda</span>

                </div>



                <div class="window-body">

                    <div class="post-header">

                        <span class="post-date">Marzo 1, 2026</span>

                        <span class="post-notes">1 Nota</span>

                    </div>

                    

                    <div class="image-frame">

                        <img src="Img/cat.png" alt="Post">

                    </div>

                    

                    <div class="caption-container">

                        <p class="caption">

                            ¡Bienvenidos a mi página de noticias! Aquí encontrarás las últimas novedades sobre mis proyectos, eventos y más. ¡Gracias por visitarme!

                        </p>

                    </div>



                    <div class="tags">

                        <a href="#">#Bienvenido</a>

                    </div>

                </div>

            </div>

        </div>



        <div class="decorations">

            <img src="Img/Mei_Ramire.png" class="character-large">

        </div>



        <div class="taskbar">

            <div class="start-button">

                <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="18">

                <span>Inicio</span>

            </div>



            <div class="taskbar-divider"></div>



            <div class="task-active">

                <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-0.png" width="16">

                <span>Mis Documentos</span>

            </div>



            <div class="system-tray">

                <img src="https://win98icons.alexmeub.com/icons/png/loudspeaker_rays-0.png" width="16">

                <span id="clock">00:00 AM</span>

            </div>

        </div>

    </div>



    <script>

    function updateClock() {

        const now = new Date();



        let hours = now.getHours();

        const minutes = now.getMinutes().toString().padStart(2, '0');



        const ampm = hours >= 12 ? 'PM' : 'AM';

        hours = hours % 12;

        hours = hours ? hours : 12;



        const timeString = hours + ':' + minutes + ' ' + ampm;



        document.getElementById('clock').textContent = timeString;

    }



    updateClock();

    setInterval(updateClock, 1000);

    </script>



</body>

</html>
